<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radar Cidadão</title>
  <link rel="shortcut icon" href="/static/favicon.ico" type="image/x-icon">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script>
    //Roda o JS somente após carregar o HTML inteiro
    document.addEventListener("DOMContentLoaded", () => {
      const btn = document.getElementById("btn-deputados");
      const menu = document.getElementById("menu-deputados");
      const seta = document.getElementById("seta");

      //Abre o dropdown e verifica se o JS está funcionando
      if (btn && menu) {
        seta.addEventListener("click", (e) => {
          e.stopPropagation();
          console.log("Botão clicado!");
          menu.classList.toggle("hidden");
          seta.classList.toggle("rotate-180");
        });

        //Fecha o dropdown ao clicar fora dele
        document.addEventListener("click", (e) => {
          if (!menu.contains(e.target) && !btn.contains(e.target)) {
            menu.classList.add("hidden");
            seta.classList.remove("rotate-180");
          }
        });
        //Erro caso os IDs não forem encontrados
      } else {
        console.error("Erro: Elementos não encontrados. Verifique os IDs.");
      }
    });
  </script>

  <style type="text/tailwindcss">
    @theme {
        --color-hover: #151385; /* Cor do hover (Ex: Botão Pesquisa) */
        --color-radar: #1a249d; /* Cor principal (Ex: cor da navbar) */
        --color-dark-blue: #081638; /* Cor dos texto */
        --color-sec: #efc33c; /* Cor amarela */
        --color-verde: #34c560 /* Cor verde */;
      }
    </style>
</head>

<body class="min-h-screen flex flex-col">
  <!--Deixa o footer sempre no final da página-->
  <main class="flex-grow">
    <!--Navbar-->
    {% include 'partials/_navbar.html' %}

    <!--Banner-->
    <section class="relative h-[510px] w-full bg-cover bg-center flex items-center"
      style="background-image: url(../static/img/banner.png)">
      <div class="absolute inset-0 bg-black/20"></div>
      <div class="relative z-10 text-white w-full max-w-[100rem] mx-auto px-5">
        <h1 class="text-3xl text-shadow-md sm:text-4xl md:text-5xl font-bold tracking-tight max-w-2xl mb-5">
          ACOMPANHE SEUS DEPUTADOS FEDERAIS!
        </h1>
        <p class="text-base sm:text-lg md:text-xl font-normal max-w-2xl">
          Saiba como votar com consciencia
        </p>
      </div>
    </section>

    <!--Barra de pesquisa-->
    <div class="bg-gray-200 py-6">
      <form action="/procurar" method="GET" class="max-w-[100rem] px-5 mx-auto flex flex-col md:flex-row gap-3">
        <input type="text" name="pesquisa" placeholder="Buscar por deputado"
          class="flex-1 px-6 py-4 rounded-none md:rounded-l-full bg-white text-gray-500 outline-none border-none shadow-sm" />

        <div class="relative flex-1">
          <select name="estado"
            class="w-full appearance-none px-6 py-4 bg-white text-gray-500 outline-none shadow-sm cursor-pointer">
            <option value="">Selecionar Estado</option>
            <option value="AC">Acre (AC)</option>
            <option value="AL">Alagoas (AL)</option>
            <option value="AP">Amapá (AP)</option>
            <option value="AM">Amazonas (AM)</option>
            <option value="BA">Bahia (BA)</option>
            <option value="CE">Ceará (CE)</option>
            <option value="DF">Distrito Federal (DF)</option>
            <option value="ES">Espírito Santo (ES)</option>
            <option value="GO">Goiás (GO)</option>
            <option value="MA">Maranhão (MA)</option>
            <option value="MT">Mato Grosso (MT)</option>
            <option value="MS">Mato Grosso do Sul (MS)</option>
            <option value="MG">Minas Gerais (MG)</option>
            <option value="PA">Pará (PA)</option>
            <option value="PB">Paraíba (PB)</option>
            <option value="PR">Paraná (PR)</option>
            <option value="PE">Pernambuco (PE)</option>
            <option value="PI">Piauí (PI)</option>
            <option value="RJ">Rio de Janeiro (RJ)</option>
            <option value="RN">Rio Grande do Norte (RN)</option>
            <option value="RS">Rio Grande do Sul (RS)</option>
            <option value="RO">Rondônia (RO)</option>
            <option value="RR">Roraima (RR)</option>
            <option value="SC">Santa Catarina (SC)</option>
            <option value="SP">São Paulo (SP)</option>
            <option value="SE">Sergipe (SE)</option>
            <option value="TO">Tocantins (TO)</option>
          </select>
          <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-400">
            <svg class="fill-current h-4 w-4" viewBox="0 0 20 20">
              <path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z" />
            </svg>
          </div>
        </div>

        <div class="relative flex-1">
          <select name="partido"
            class="w-full appearance-none px-6 py-4 bg-white text-gray-500 outline-none shadow-sm cursor-pointer">
            <option value="">Partido</option>
            {% for p in partidos %}
            <option value="{{ p }}">{{ p }}</option>
            {% endfor %}
          </select>
          <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-400">
            <svg class="fill-current h-4 w-4" viewBox="0 0 20 20">
              <path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z" />
            </svg>
          </div>
        </div>

        <button
          class="bg-radar px-8 py-4 rounded-none md:rounded-r-full hover:bg-hover transition-colors shadow-sm flex items-center justify-center cursor-pointer">
          <svg class="w-6 h-6 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
          </svg>
        </button>
      </form>
    </div>
    <!--Saiba mais sobre-->
    <div class="w-full max-w-[100rem] mx-auto px-5">
      <h1 class="text-black text-2xl md:text-3xl font-bold font-poppins py-10">
        Saiba Mais Sobre...
      </h1>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-15">
        <!--Botões que levam aos gráficos-->
        <button class="text-left w-full">
          <a href="#">
            <div class="bg-[#E5E5E5] shadow-lg w-full h-full hover:scale-105 duration-300">
              <img src="../static/img/gastos.png" class="w-full object-cover" />
              <h1 class="text-black pl-5 pt-3 font-bold text-xl">Gastos</h1>
              <h1 class="text-black pl-5 pt-1 pb-4 font-semibold text-base">
                Descubra se os gastos do seu deputado são úteis.
              </h1>
            </div>
          </a>
        </button>

        <button class="text-left">
          <a href="#">
            <div class="bg-[#E5E5E5] shadow-lg w-full h-full hover:scale-105 duration-300">
              <img src="../static/img/projetos.png" class="w-full object-cover" />
              <h1 class="text-black pl-5 pt-3 font-bold text-xl">Projetos</h1>
              <h1 class="text-black pl-5 pt-1 pb-4 font-semibold text-base">
                Descubra sobre os projetos seu deputado.
              </h1>
            </div>
          </a>
        </button>

        <button class="text-left">
          <a href="#">
            <div class="bg-[#E5E5E5] shadow-lg w-full h-full hover:scale-105 duration-300">
              <img src="../static/img/presenca.png" class="w-full object-cover" />
              <h1 class="text-black pl-5 pt-3 font-bold text-xl">Presença</h1>
              <h1 class="text-black pl-5 pt-1 pb-4 font-semibold text-base">
                Descubra se o seu deputado está faltando muito.
              </h1>
            </div>
          </a>
        </button>
      </div>
    </div>
  </main>
  <!--Footer-->
  <footer class="bg-[#e5e5e5] py-8 text-center">
    <h1 class="text-sm font-medium text-black">
      Todos os direitos preservados a Lumina
    </h1>
  </footer>
</body>

</html>
